description: >
  Perform stylesheet linting.

executor: << parameters.executor >>

parameters:
  executor:
    default: node/default
    description: Executor to use for this job, defaults to node executor
    type: executor

steps:
  - checkout
  - node/install-packages:
      pkg-manager: yarn
  - run:
      name: Lint styles
      command: yarn run stylelint
