description: >
  Perform rspec testing without a database.

executor: << parameters.executor >>
parallelism: << parameters.parallelism >>

parameters:
  executor:
    default: ruby
    description: Executor to use for this job, defaults to ruby executor
    type: executor
  parallelism:
    default: 1
    description: Number of parallel containers to use for testing
    type: integer
  use-codecov:
    default: true
    description: True because CodeClimate is no longer supported
    type: boolean
  install-node:
    default: false
    description: True to install Node.js
    type: boolean
  node-version:
    default: "24.16.0"
    description: Node.js version to install
    type: string
  before-test:
    default: []
    description: Optional steps to run before running rspec
    type: steps

steps:
  - checkout
  - gem-install-deps
  - when:
      condition: << parameters.install-node >>
      steps:
        - node/install:
              node-version: << parameters.node-version >>
              install-yarn: true
  - run:
      name: Install rspec_junit_formatter
      command: bundle add rspec_junit_formatter
  - when:
      condition: << parameters.before-test >>
      steps: << parameters.before-test >>
  - test:
      use-codecov: << parameters.use-codecov >>
